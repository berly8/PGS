version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pgs-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: pgs_db
      MYSQL_USER: pgs_user
      MYSQL_PASSWORD: pgs_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pgs-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./pgs-backend
      dockerfile: Dockerfile
    container_name: pgs-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pgs_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: pgs_user
      SPRING_DATASOURCE_PASSWORD: pgs_password
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pgs-network

  frontend:
    build:
      context: ./pgs-frontend
      dockerfile: Dockerfile
    container_name: pgs-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - pgs-network

networks:
  pgs-network:
    driver: bridge

volumes:
  mysql_data:

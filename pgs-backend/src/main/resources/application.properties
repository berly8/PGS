spring.application.name=pgs-backend

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/pgs_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=pgs_user
spring.datasource.password=pgs_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=pgs_super_secret_key_for_jwt_token_generation_2024_very_long_and_secure
app.jwt.expiration=86400000

# CORS - allow all origins in dev
app.cors.allowed-origins=http://localhost:4200,http://localhost:4201,http://127.0.0.1:4200

# Server
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# Logging
logging.level.com.pgs=INFO
logging.level.org.springframework.security=WARN
